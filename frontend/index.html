<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="نور - المساعد الذكي لطلاب جامعة العلوم والتقانة. اسأل أي سؤال عن القبول، التسجيل، الكليات، والمزيد.">
    <title>نور | المساعد الذكي — جامعة العلوم والتقانة</title>
    
    <!-- Google Fonts: Cairo for Arabic, Inter for English -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
    <!-- Background particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-icon">
                        <svg viewBox="0 0 40 40" fill="none">
                            <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="2.5" fill="none"/>
                            <path d="M20 8 L20 32 M12 16 L20 8 L28 16" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#60a5fa"/>
                                    <stop offset="100%" stop-color="#c084fc"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>نور</h1>
                        <span>جامعة العلوم والتقانة</span>
                    </div>
                </div>
                <button class="new-chat-btn" id="newChatBtn" title="محادثة جديدة">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span>محادثة جديدة</span>
                </button>
                <button class="close-sidebar-btn" id="closeSidebarBtn" style="display: none; background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; border-radius: 4px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="sidebar-nav">
                <div class="nav-section-title">روابط سريعة</div>
                <a href="https://portal.ust.edu.sd" target="_blank" class="nav-link" id="navPortal">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
                    بوابة الجامعة
                </a>
                <a href="https://reg.ust.edu.sd" target="_blank" class="nav-link" id="navReg">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                    التسجيل
                </a>
                <a href="https://ust.edu.sd" target="_blank" class="nav-link" id="navWebsite">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                    موقع الجامعة
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="theme-toggle" id="themeToggle" title="تبديل المظهر">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </div>
                <a href="/admin" class="admin-link" id="adminLink">لوحة التحكم</a>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <button class="menu-btn" id="menuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <div class="mobile-title">
                    <span class="mobile-logo-text">نور</span>
                    <span class="mobile-subtitle">UST</span>
                </div>
                <button class="new-chat-btn-mobile" id="newChatBtnMobile">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </header>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-glow"></div>
                    <div class="welcome-icon">
                        <svg viewBox="0 0 80 80" fill="none">
                            <circle cx="40" cy="40" r="36" stroke="url(#welcomeGrad)" stroke-width="3" fill="none" opacity="0.3"/>
                            <circle cx="40" cy="40" r="28" stroke="url(#welcomeGrad)" stroke-width="2.5" fill="none" opacity="0.6"/>
                            <circle cx="40" cy="40" r="20" stroke="url(#welcomeGrad)" stroke-width="2" fill="url(#welcomeGrad)" fill-opacity="0.1"/>
                            <path d="M40 28 L40 52 M32 36 L40 28 L48 36" stroke="url(#welcomeGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="welcomeGrad" x1="0" y1="0" x2="80" y2="80">
                                    <stop offset="0%" stop-color="#60a5fa"/>
                                    <stop offset="50%" stop-color="#a78bfa"/>
                                    <stop offset="100%" stop-color="#c084fc"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2 class="welcome-title">مرحباً بك في <span class="gradient-text">نور</span></h2>
                    <p class="welcome-subtitle">المساعد الذكي لطلاب جامعة العلوم والتقانة</p>
                    <p class="welcome-desc">اسألني عن القبول، التسجيل، الكليات، الرسوم، أو أي شيء يخص الجامعة!</p>
                    
                    <div class="suggestion-chips">
                        <button class="chip" data-question="ما هي شروط القبول في الجامعة؟" id="chip1">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
                            شروط القبول
                        </button>
                        <button class="chip" data-question="ما هي الكليات المتاحة في الجامعة؟" id="chip2">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                            الكليات المتاحة
                        </button>
                        <button class="chip" data-question="كيف أسجل كطالب جديد؟" id="chip3">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
                            التسجيل كطالب جديد
                        </button>
                        <button class="chip" data-question="What are the graduation requirements?" id="chip4">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 1.657 2.686 3 6 3s6-1.343 6-3v-5"/></svg>
                            Graduation Requirements
                        </button>
                        <button class="chip" data-question="ما هي الشهادات التي تمنحها الجامعة؟" id="chip5">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                            الشهادات والدرجات
                        </button>
                        <button class="chip" data-question="أين يقع حرم الجامعة الرئيسي؟" id="chip6">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            موقع الجامعة
                        </button>
                    </div>
                </div>

                <!-- Messages will be inserted here -->
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper" id="inputWrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="اكتب سؤالك هنا... | Type your question here..."
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled title="إرسال">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">نور يستخدم الذكاء الاصطناعي للإجابة بناءً على معلومات الجامعة الرسمية</p>
            </div>
        </main>
        
        <!-- Mobile sidebar overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js?v=5"></script>
</body>
</html>
